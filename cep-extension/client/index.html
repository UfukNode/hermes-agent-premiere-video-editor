<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HERMES Premiere Video Editor</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">⚕</div>
          <div>
            <p class="eyebrow">Hermes Agent</p>
            <h1>Premiere Video Editor</h1>
          </div>
        </div>
      </header>

      <section class="card intro-card">
        <p class="intro-text">Select one timeline clip. Hermes cleans the selected clip and writes it back into the same active sequence.</p>
      </section>

      <section class="card mode-card">
        <div class="control-group">
          <span class="label">Mode</span>
          <div class="chip-row" id="modeRow">
            <button class="chip is-active" data-mode="silence" type="button">Silence</button>
            <button class="chip" data-mode="speech-clean" type="button">Speech</button>
            <button class="chip" data-mode="hybrid" type="button">Hybrid</button>
          </div>
        </div>
      </section>

      <section class="card language-card">
        <div class="control-group">
          <span class="label">Language</span>
          <div class="chip-row" id="languageRow">
            <button class="chip is-active" data-language="en" type="button">EN</button>
            <button class="chip" data-language="tr" type="button">TR</button>
          </div>
        </div>
      </section>

      <section class="card result-card">
        <p class="label">Status</p>
        <strong id="statusTitle">Ready</strong>
        <p id="statusText">Press Start to clean the selected clip in the active sequence.</p>
      </section>

      <footer class="action-dock">
        <button id="refreshSelectionBtn" class="ghost" type="button">Refresh Selection</button>
        <button id="runBtn" class="primary" type="button">
          <span id="runSpinner" class="spinner" aria-hidden="true"></span>
          <span id="runLabel">Start</span>
        </button>
      </footer>
    </div>

    <script src="./lib/csinterface.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
